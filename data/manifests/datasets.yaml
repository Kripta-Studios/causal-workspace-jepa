datasets:
  pointmass2d:
    canonical_name: PointMass2D
    source: local deterministic generator
    version: v0
    license: generated
    checksum: pending
    compressed_size: generated below cpu_vps cap
    modalities: [state, action]
    observation_shape: [4]
    action_shape: [2]
    split: trajectory_seed
    ood_splits: [mass, drag, force_scale, observation_noise]
    download_command: none
    preprocessing_command: python scripts/generate_tier0.py --config configs/data/tier0_smoke.yaml
    resource_modes_allowed: [cpu_vps, gpu_12gb, gpu_cluster]
    purpose: tiny action-conditioned dynamics
    leakage_risks: trajectory_seed_overlap
    status: SMOKE_VALIDATED
    smoke_manifest: data/manifests/tier0_smoke_manifest.json
  multitask_pointmass2d:
    canonical_name: MultiTaskPointMass2D
    source: local deterministic generator
    version: v0
    license: generated
    checksum: in_memory_seed_reproducible
    compressed_size: generated in memory below cpu_vps cap
    modalities: [state, task_context, action]
    observation_shape: [8]
    action_shape: [2]
    split: trajectory_and_goal_mass_composition
    ood_splits: [heldout_goal_mass_composition, external_mass]
    download_command: none
    preprocessing_command: python scripts/run_experiment.py --config configs/experiments/multitask_workspace_study.yaml
    resource_modes_allowed: [cpu_vps, gpu_12gb, gpu_cluster]
    purpose: multi_task_workspace_candidate_audit
    leakage_risks: trajectory_or_task_composition_overlap
    status: SMOKE_VALIDATED
  pixel_tiny_maze:
    canonical_name: PixelTinyMaze
    source: local deterministic renderer over TinyMaze dynamics
    version: v1
    license: generated under repository license
    checksum: in_memory_seed_reproducible
    compressed_size: generated in memory below Tier 0 512 MB cap
    modalities: [rgb_channels, action, state]
    observation_shape: [3, 20, 20]
    action_shape: [4]
    split: disjoint trajectory seeds 83/89/97
    ood_splits: [not claimed in WM-LEWM-001]
    download_command: none
    preprocessing_command: python scripts/run_experiment.py --config configs/experiments/lewm_small_reproduction_v1.yaml
    resource_modes_allowed: [gpu_12gb, gpu_cluster]
    purpose: source-informed small LeWorldModel variant and causal planner audit
    leakage_risks: trajectory_seed_or_goal_overlap
    status: SMOKE_VALIDATED
  eb_jepa_two_rooms:
    canonical_name: EB-JEPA Two Rooms
    source: official on-the-fly generator at facebookresearch/eb_jepa
    version: 966e61e9285b3a876f49b9774e9720d9a99a7925
    license: Apache-2.0 upstream code; generated samples
    checksum: deterministic_seed_and_pinned_source_pending_training_run
    compressed_size: generated on the fly; no raw download
    modalities: [two_channel_pixels, continuous_action, xy_state, wall_layout]
    observation_shape: [2, 65, 65]
    action_shape: [2]
    split: official 100000 train and 10000 validation samples with frozen seed per run
    ood_splits: [fixed_wall, random_wall, heldout_wall_and_door_layouts]
    download_command: none
    preprocessing_command: generated online by the official Two Rooms dataloader
    resource_modes_allowed: [gpu_12gb, gpu_cluster]
    purpose: competent published action-conditioned planning and recurrent circuit audit
    leakage_risks: wall_layout_or_planning_episode_overlap
    status: BLOCKED_OFFICIAL_ENV
  qwen_real:
    canonical_name: Qwen hidden-state interventions
    source: Hugging Face Qwen
    version: pending
    license: model license applies
    checksum: pending
    compressed_size: blocked on CPU VPS
    modalities: [tokens, activations, logits]
    observation_shape: selected_layers_positions
    action_shape: intervention_schema
    split: prompt_entity_site_magnitude
    ood_splits: [prompt_family, entity, layer, site, magnitude]
    download_command: BLOCKED_RESOURCE
    preprocessing_command: python scripts/capture_qwen_activations.py --config configs/llm/qwen3_4b_selected_layers.yaml
    resource_modes_allowed: [gpu_12gb, gpu_cluster]
    purpose: real LLM intervention meta-modeling
    leakage_risks: prompt_entity_donor_overlap
    status: BLOCKED_RESOURCE
