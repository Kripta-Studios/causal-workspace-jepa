datasets:
  pointmass2d:
    canonical_name: PointMass2D
    source: local deterministic generator
    version: v0
    license: generated
    checksum: pending
    compressed_size: generated below cpu_vps cap
    modalities: [state, action]
    observation_shape: [4]
    action_shape: [2]
    split: trajectory_seed
    ood_splits: [mass, drag, force_scale, observation_noise]
    download_command: none
    preprocessing_command: python scripts/generate_tier0.py --config configs/data/tier0_smoke.yaml
    resource_modes_allowed: [cpu_vps, gpu_12gb, gpu_cluster]
